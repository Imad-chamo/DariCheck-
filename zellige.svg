<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <!-- Zellige star fill -->
  <polygon points="86,60 70,55.9 78.4,41.6 64.1,50 60,34 55.9,50 41.6,41.6 50,55.9 34,60 50,64.1 41.6,78.4 55.9,70 60,86 64.1,70 78.4,78.4 70,64.1"
    fill="rgba(39,174,96,0.12)" stroke="none"/>
  <g fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1.2" stroke-linejoin="round">
    <!-- 8-pointed star outline -->
    <polygon points="86,60 70,55.9 78.4,41.6 64.1,50 60,34 55.9,50 41.6,41.6 50,55.9 34,60 50,64.1 41.6,78.4 55.9,70 60,86 64.1,70 78.4,78.4 70,64.1"/>
    <!-- Connecting lines to edges -->
    <line x1="86" y1="60" x2="120" y2="60"/>
    <line x1="34" y1="60" x2="0" y2="60"/>
    <line x1="60" y1="34" x2="60" y2="0"/>
    <line x1="60" y1="86" x2="60" y2="120"/>
    <!-- Connecting lines to corners -->
    <line x1="78.4" y1="41.6" x2="120" y2="0"/>
    <line x1="41.6" y1="41.6" x2="0" y2="0"/>
    <line x1="41.6" y1="78.4" x2="0" y2="120"/>
    <line x1="78.4" y1="78.4" x2="120" y2="120"/>
    <!-- Edge mid connectors (half-diamonds) -->
    <polygon points="52,0 60,9 68,0"/>
    <polygon points="120,52 111,60 120,68"/>
    <polygon points="52,120 60,111 68,120"/>
    <polygon points="0,52 9,60 0,68"/>
    <!-- Corner quarter-diamonds -->
    <polygon points="0,0 13,0 0,13"/>
    <polygon points="120,0 107,0 120,13"/>
    <polygon points="0,120 13,120 0,107"/>
    <polygon points="120,120 107,120 120,107"/>
  </g>
</svg>
